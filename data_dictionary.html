<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>WFIGS Daily Perimeters — Data Dictionary</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f5; color: #222; }

  thead { background: #2c2c2c; color: white; position: sticky; top: 0; z-index: 1; }

  thead th:hover { background: #444; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #fff3e0; }
  td { padding: 0.55rem 1rem; vertical-align: top; border-bottom: 1px solid #eee; }
  td.col-name { font-family: monospace; font-size: 0.82rem; color: #1a1a6e; white-space: nowrap; }
  td.col-type { font-family: monospace; font-size: 0.8rem; color: #555; white-space: nowrap; }
  td.col-group { white-space: nowrap; }
  td.col-desc { color: #333; max-width: 520px; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
  .badge-poly { background: #d1ecf1; color: #0c5460; }
  .badge-attr { background: #d4edda; color: #155724; }
  .badge-meta { background: #e2e3e5; color: #383d41; }
  .badge-geo  { background: #fff3cd; color: #856404; }
  .src-official { font-size: 0.72rem; color: #888; font-style: italic; }
  .src-inferred { font-size: 0.72rem; color: #b07a00; font-style: italic; }
  .hidden { display: none; }
  .wrapper { padding: 0 0 2rem; }
  /* Stats cell */
  td.col-stats { min-width: 200px; max-width: 260px; font-size: 0.78rem; color: #333; }
  .stat-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.05rem 0.5rem; }
  .stat-grid span:nth-child(odd) { color: #888; text-align: right; white-space: nowrap; }
  .stat-grid span:nth-child(even) { font-family: monospace; }

  .null-label { font-size: 0.7rem; color: #999; }
  .top-pills { display: flex; flex-wrap: wrap; gap: 0.2rem; margin-top: 0.25rem; }
  .pill { background: #e8e8e8; border-radius: 3px; padding: 0.1rem 0.35rem; font-size: 0.7rem; white-space: nowrap; }
  .pill em { color: #888; font-style: normal; }
  .no-stats { color: #bbb; font-style: italic; font-size: 0.75rem; }
  .stats-pending { color: #bbb; font-style: italic; font-size: 0.75rem; }
</style>

  ["attr_POOLegalDescQtrQtr",           "object",  "attr", "Quarter-quarter section of the legal description at point of origin.", OFFICIAL],
  ["attr_POOLegalDescRange",            "object",  "attr", "Range of the legal description at point of origin.", OFFICIAL],
  ["attr_POOLegalDescSection",          "float64", "attr", "Section number of the legal description at point of origin.", OFFICIAL],
  ["attr_POOLegalDescTownship",         "object",  "attr", "Township of the legal description at point of origin.", OFFICIAL],
  ["attr_POOPredictiveServiceAreaID",   "object",  "attr", "Predictive Service Area ID at point of origin (PSAs are climate-based geographic areas derived from RAWS data).", OFFICIAL],
  ["attr_POOProtectingAgency",          "object",  "attr", "Agency with fire protection responsibility at point of origin.", OFFICIAL],
  ["attr_POOProtectingUnit",            "object",  "attr", "NWCG Unit responsible for direct incident management at point of origin (protection may be re-assigned by agreement).", OFFICIAL],
  ["attr_POOState",                     "object",  "attr", "Two-letter state alpha code at point of origin.", OFFICIAL],
  ["attr_PredominantFuelGroup",         "object",  "attr", "Majority fuel model type in the incident area, grouped into one of seven categories.", OFFICIAL],
  ["attr_PredominantFuelModel",         "object",  "attr", "Fuel model best representing the majority of the incident area.", OFFICIAL],
  ["attr_PrimaryFuelModel",             "object",  "attr", "Fuel model representing the primary carrier of fire for the reporting period.", OFFICIAL],

function badge(group) {
  const cls = { poly: "badge-poly", attr: "badge-attr", meta: "badge-meta", geo: "badge-geo" }[group] || "";
  const labels = { poly: "poly", attr: "attr", meta: "meta", geo: "geo" };
  return `<span class="badge ${cls}">${labels[group] || group}</span>`;
}

function srcTag(src) {
  if (src === OFFICIAL) return `<br><span class="src-official">&#10003; ${src}</span>`;
  return `<br><span class="src-inferred">&#9888; ${src}</span>`;
}

function fmt(n) {
  if (n === undefined || n === null) return "—";
  if (Math.abs(n) >= 1e6) return n.toLocaleString(undefined, {maximumFractionDigits: 0});
  if (Math.abs(n) >= 1000) return n.toLocaleString(undefined, {maximumFractionDigits: 1});
  if (Number.isInteger(n)) return n.toString();
  return n.toLocaleString(undefined, {maximumFractionDigits: 3});
}

function statsHtml(col) {
  if (typeof COLUMN_STATS === "undefined") return `<span class="stats-pending">run notebook cell to generate</span>`;
  const s = COLUMN_STATS[col];
  if (!s) return `<span class="no-stats">—</span>`;

  const nullBar = s.null_pct > 0
    ? `<div class="null-bar-wrap"><div class="null-bar" style="width:${Math.max(s.null_pct,2)}%"></div></div>
       <span class="null-label">${s.null_pct}% null (${s.null_count.toLocaleString()} / ${s.count.toLocaleString()})</span>`
    : `<span class="null-label">no nulls</span>`;

  if (s.kind === "geometry") return `<span class="no-stats">polygon geometry</span>`;

  if (s.kind === "datetime") {
    return `<div class="stat-grid">
      <span>from</span><span>${s.min ?? "—"}</span>
      <span>to</span><span>${s.max ?? "—"}</span>
    </div>${nullBar}`;
  }

  if (s.kind === "numeric") {
    return `<div class="stat-grid">
      <span>mean</span><span>${fmt(s.mean)}</span>
      <span>median</span><span>${fmt(s.median)}</span>
      <span>min</span><span>${fmt(s.min)}</span>
      <span>max</span><span>${fmt(s.max)}</span>
    </div>${nullBar}`;
  }

  if (s.kind === "categorical") {
    const pills = (s.top_values || []).map(([v, n]) =>
      `<span class="pill">${v} <em>${n.toLocaleString()}</em></span>`).join("");
    return `<div><span class="null-label">${s.unique.toLocaleString()} unique values</span></div>
      <div class="top-pills">${pills}</div>${nullBar}`;
  }

  return `<span class="no-stats">—</span>`;
}

const tbody = document.getElementById("tbody");
function render(data) {
  tbody.innerHTML = data.map(([col, type, group, desc, src]) => `
    <tr data-group="${group}">
      <td class="col-name">${col}</td>
      <td class="col-type">${type}</td>
      <td class="col-group">${badge(group)}</td>
      <td class="col-desc">${desc}${srcTag(src)}</td>
      <td class="col-stats">${statsHtml(col)}</td>
    </tr>`).join("");
  document.getElementById("count").textContent = `Showing ${data.length} of ${rows.length} columns`;
}

render(rows);

function filter() {
  const q = document.getElementById("search").value.toLowerCase();
  const g = document.getElementById("groupFilter").value;
  const filtered = rows.filter(([col,,group,desc]) =>
    (!q || col.toLowerCase().includes(q) || desc.toLowerCase().includes(q)) &&
    (!g || group === g)
  );
  render(filtered);
}

document.getElementById("search").addEventListener("input", filter);
document.getElementById("groupFilter").addEventListener("change", filter);
</script>
</body>
</html>
